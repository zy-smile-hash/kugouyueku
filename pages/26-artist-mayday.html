<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>五月天歌曲精选</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
        }
        .page-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #2d1f1a 0%, #4a3728 100%);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .page-back {
            font-size: 24px;
            cursor: pointer;
            margin-right: 12px;
        }
        .page-title {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }
        .page-content {
            padding: 16px;
            min-height: calc(100vh - 50px);
        }
        .page-image-container {
            background: #fff;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            text-align: center;
        }
        .page-image {
            width: 100%;
            max-width: 400px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }
        .page-info {
            background: #fff;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .page-info-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .page-info-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }
        .page-instructions {
            background: #fff3cd;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .page-instructions-title {
            font-size: 14px;
            font-weight: 600;
            color: #856404;
            margin-bottom: 8px;
        }
        .page-instructions-text {
            font-size: 13px;
            color: #856404;
            line-height: 1.6;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: linear-gradient(135deg, #2d1f1a 0%, #4a3728 100%);
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <span class="time">08:57</span>
        <div class="status-icons">
            <span>📶</span>
            <span>📡</span>
            <span>🔋</span>
        </div>
    </div>

    <!-- 页面头部 -->
    <div class="page-header">
        <span class="page-back" onclick="window.close()">←</span>
        <span class="page-title">五月天歌曲精选</span>
    </div>
    
    <!-- 页面内容 -->
    <div class="page-content">
        <!-- 页面说明 -->
        <div class="page-info">
            <div class="page-info-title">页面信息</div>
            <div class="page-info-desc">
                <strong>页面名称：</strong>五月天歌曲精选<br>
                <strong>页面文件：</strong>26-artist-mayday.html<br>
                <strong>功能说明：</strong>五月天乐队详情页
            </div>
        </div>

        <!-- 图片上传区域 -->
        <div class="page-image-container">
            <div class="page-image">
                <p style="color: #999; margin-bottom: 10px;">五月天歌曲精选</p>
                <p style="font-size: 14px; color: #666;">请在此处放置页面设计图</p>
                <p style="font-size: 12px; color: #999; margin-top: 10px;">建议尺寸：430px × 800px</p>
            </div>
        </div>

        <!-- 操作说明 -->
        <div class="page-instructions">
            <div class="page-instructions-title">📝 操作说明</div>
            <div class="page-instructions-text">
                1. 乐队信息<br>2. 歌曲列表<br>3. 专辑、视频<br>4. 关注、分享
            </div>
        </div>
    </div>
</body>
</html>
