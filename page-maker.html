<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酷狗乐库 - 页面制作工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        /* 左侧列表区域 */
        .left-panel {
            width: 320px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            background: linear-gradient(135deg, #2d1f1a 0%, #4a3728 100%);
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        .panel-header h1 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .panel-header p {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: #f8f8f8;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: 600;
            color: #ff6b6b;
        }
        
        .stat-label {
            font-size: 11px;
            color: #999;
        }
        
        .page-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            padding: 12px 8px 8px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .page-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        
        .page-item:hover {
            background: #f5f5f5;
        }
        
        .page-item.active {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            color: #fff;
        }
        
        .page-item.completed {
            background: #e8f5e9;
        }
        
        .page-item.completed .page-name {
            color: #2e7d32;
        }
        
        .page-number {
            width: 28px;
            height: 28px;
            background: #ff6b6b;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .page-item.active .page-number {
            background: #fff;
            color: #ff6b6b;
        }
        
        .page-item.completed .page-number {
            background: #4caf50;
        }
        
        .page-info {
            flex: 1;
            min-width: 0;
        }
        
        .page-name {
            font-size: 13px;
            color: #333;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .page-item.active .page-name {
            color: #fff;
        }
        
        .page-file {
            font-size: 10px;
            color: #999;
        }
        
        .page-item.active .page-file {
            color: rgba(255, 255, 255, 0.8);
        }
        
        .page-status {
            font-size: 18px;
            margin-left: 8px;
        }
        
        /* 右侧预览区域 */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f0f0f0;
        }
        
        .preview-header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .preview-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .preview-nav {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .nav-btn:hover {
            background: #e0e0e0;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .nav-btn.primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            color: #fff;
        }
        
        .nav-btn.primary:hover {
            opacity: 0.9;
        }
        
        .preview-content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
        }
        
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #fff;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .phone-status-bar {
            height: 44px;
            background: linear-gradient(135deg, #2d1f1a 0%, #4a3728 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
        }
        
        .phone-content {
            flex: 1;
            overflow-y: auto;
            background: #fff;
        }
        
        .phone-page-info {
            padding: 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .info-desc {
            font-size: 13px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .info-file {
            font-size: 11px;
            color: #999;
            margin-bottom: 12px;
        }
        
        /* 上传区域 */
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 32px 20px;
            text-align: center;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        
        .upload-area.dragover {
            border-color: #ff6b6b;
            background: #fff0f0;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .upload-text {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            font-size: 12px;
            color: #999;
        }
        
        /* 图片预览 */
        .image-preview {
            width: 100%;
            margin-top: 16px;
        }
        
        .image-preview img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .image-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .image-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .image-btn.replace {
            background: #f5f5f5;
            color: #666;
        }
        
        .image-btn.replace:hover {
            background: #e0e0e0;
        }
        
        .image-btn.remove {
            background: #ffebee;
            color: #f44336;
        }
        
        .image-btn.remove:hover {
            background: #ffcdd2;
        }
        
        /* 完成提示 */
        .completion-banner {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .completion-banner .icon {
            font-size: 20px;
        }
        
        .completion-banner .text {
            font-size: 13px;
        }
        
        /* 隐藏的文件输入 */
        #fileInput {
            display: none;
        }
        
        /* 进度条 */
        .progress-section {
            padding: 12px 16px;
            background: #f8f8f8;
        }
        
        .progress-bar {
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b 0%, #ff4757 100%);
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 11px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧页面列表 -->
        <div class="left-panel">
            <div class="panel-header">
                <h1>🎵 页面制作工具</h1>
                <p>点击页面，补充设计图片</p>
            </div>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">33</div>
                    <div class="stat-label">总页面</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="remainingCount">33</div>
                    <div class="stat-label">剩余</div>
                </div>
            </div>
            
            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0% 已完成</div>
            </div>
            
            <div class="page-list" id="pageList">
                <!-- 页面列表将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 右侧预览区域 -->
        <div class="right-panel">
            <div class="preview-header">
                <div class="preview-title" id="currentPageTitle">请选择一个页面</div>
                <div class="preview-nav">
                    <button class="nav-btn" id="prevBtn" onclick="prevPage()" disabled>← 上一个</button>
                    <button class="nav-btn" id="nextBtn" onclick="nextPage()" disabled>下一个 →</button>
                    <button class="nav-btn primary" id="markDoneBtn" onclick="markAsDone()" disabled>✓ 标记完成</button>
                </div>
            </div>
            
            <div class="preview-content">
                <div class="phone-frame">
                    <div class="phone-status-bar">
                        <span id="phoneTime">08:57</span>
                        <div style="display: flex; gap: 8px;">
                            <span>📶</span>
                            <span>📡</span>
                            <span>🔋</span>
                        </div>
                    </div>
                    
                    <div class="phone-content" id="phoneContent">
                        <div class="phone-page-info">
                            <div class="info-title" id="infoTitle">选择一个页面开始</div>
                            <div class="info-desc" id="infoDesc">请从左侧列表选择一个页面，然后上传对应的设计图片</div>
                            <div class="info-file" id="infoFile"></div>
                            
                            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                                <div class="upload-icon">📷</div>
                                <div class="upload-text">点击上传设计图片</div>
                                <div class="upload-hint">支持 PNG、JPG 格式，建议尺寸 430×800px</div>
                            </div>
                            
                            <div class="image-preview" id="imagePreview" style="display: none;">
                                <img id="previewImage" src="" alt="预览">
                                <div class="image-actions">
                                    <button class="image-btn replace" onclick="document.getElementById('fileInput').click()">替换图片</button>
                                    <button class="image-btn remove" onclick="removeImage()">删除</button>
                                </div>
                            </div>
                            
                            <div class="completion-banner" id="completionBanner" style="display: none;">
                                <span class="icon">✅</span>
                                <span class="text">此页面已完成！点击"下一个"继续</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg" onchange="handleFileSelect(event)">
    
    <script>
        // 页面配置数据
        const pages = [
            // 一、顶部导航区
            { id: 1, name: '搜索结果', file: '01-search-result.html', category: '顶部导航区', desc: '输入文字搜索站内信息，显示搜索结果列表' },
            { id: 2, name: '扫码登录', file: '02-scan-login.html', category: '顶部导航区', desc: '扫码登录第三方设备，显示扫码界面' },
            { id: 3, name: '搜索推荐', file: '03-search-recommend.html', category: '顶部导航区', desc: '显示推荐搜索词和热搜榜单' },
            
            // 二、快捷功能入口区
            { id: 4, name: '歌曲/歌单分类', file: '04-category.html', category: '快捷功能入口', desc: '按专区、频道展示不同类型歌曲' },
            { id: 5, name: '排行榜列表', file: '05-rank-list.html', category: '快捷功能入口', desc: '展示各类标签榜单' },
            { id: 6, name: '歌手分类', file: '06-artist-category.html', category: '快捷功能入口', desc: '按地区、性别展示歌手' },
            { id: 7, name: 'APP下载', file: '07-app-download.html', category: '快捷功能入口', desc: 'vemus未音app下载页面' },
            { id: 8, name: '勋章收藏馆', file: '08-medal-collection.html', category: '快捷功能入口', desc: '展示已获得的勋章列表' },
            { id: 9, name: '乐迷勋章', file: '09-medal-fans.html', category: '快捷功能入口', desc: '乐迷勋章管理和展示页面' },
            { id: 10, name: '至臻唱片库', file: '10-premium-album.html', category: '快捷功能入口', desc: '专辑展示页面，支持多条件筛选' },
            { id: 11, name: '星光站', file: '11-star-station.html', category: '快捷功能入口', desc: '抽碎片集明星卡，兑换商品' },
            { id: 12, name: 'AI写歌', file: '12-ai-create.html', category: '快捷功能入口', desc: '通过对话模式/专业模式AI生成歌曲' },
            { id: 13, name: '数字专辑唱片店', file: '13-digital-album.html', category: '快捷功能入口', desc: '付费购买数字专辑' },
            { id: 14, name: '酷狗商城', file: '14-mall.html', category: '快捷功能入口', desc: '商城H5页面，可购买各类商品' },
            { id: 15, name: '演唱会票务', file: '15-concert.html', category: '快捷功能入口', desc: '预约购买演唱会门票' },
            { id: 16, name: '新歌预约', file: '16-new-song-reserve.html', category: '快捷功能入口', desc: '预约新歌/专辑，上线后通知' },
            
            // 三、内容主分区
            { id: 17, name: '编辑精选详情', file: '17-featured-detail.html', category: '内容主分区', desc: '歌单/活动/专辑/期刊详情' },
            { id: 18, name: '热歌榜详情', file: '18-hot-rank-detail.html', category: '内容主分区', desc: '热歌榜歌曲列表' },
            { id: 19, name: '新歌速递详情', file: '19-new-song-detail.html', category: '内容主分区', desc: '新歌列表展示' },
            { id: 20, name: '热门专区详情', file: '20-hot-zone-detail.html', category: '内容主分区', desc: '专区歌曲列表' },
            { id: 21, name: '一人一首张国荣', file: '21-golden-leslie.html', category: '内容主分区', desc: '张国荣歌手页面' },
            { id: 22, name: '一人一首周传雄', file: '22-golden-vic.html', category: '内容主分区', desc: '周传雄歌手页面' },
            { id: 23, name: '一人一首张信哲', file: '23-golden-jeff.html', category: '内容主分区', desc: '张信哲歌手页面' },
            { id: 24, name: '周杰伦歌曲精选', file: '24-artist-jay.html', category: '内容主分区', desc: '周杰伦歌手详情页' },
            { id: 25, name: '林俊杰歌曲精选', file: '25-artist-jj.html', category: '内容主分区', desc: '林俊杰歌手详情页' },
            { id: 26, name: '五月天歌曲精选', file: '26-artist-mayday.html', category: '内容主分区', desc: '五月天乐队详情页' },
            { id: 27, name: '国风国潮专区详情', file: '27-chinese-style-detail.html', category: '内容主分区', desc: '国风歌曲专区' },
            { id: 28, name: '热门综艺详情', file: '28-variety-detail.html', category: '内容主分区', desc: '综艺详情页' },
            { id: 29, name: '热门游戏详情', file: '29-game-detail.html', category: '内容主分区', desc: '游戏歌单页面' },
            { id: 30, name: '热门影视详情', file: '30-movie-detail.html', category: '内容主分区', desc: '影视原声页面' },
            { id: 31, name: '词曲名家集详情', file: '31-composer-detail.html', category: '内容主分区', desc: '词曲名家页面' },
            { id: 32, name: '厂牌音乐详情', file: '32-label-detail.html', category: '内容主分区', desc: '厂牌主页' },
            
            // 四、全局体验区
            { id: 33, name: '播放列表', file: '33-playlist.html', category: '全局体验区', desc: '当前播放歌单' }
        ];
        
        let currentPageId = null;
        let completedPages = new Set();
        
        // 从localStorage加载已完成的页面
        function loadCompletedPages() {
            const saved = localStorage.getItem('completedPages');
            if (saved) {
                completedPages = new Set(JSON.parse(saved));
            }
        }
        
        // 保存已完成的页面
        function saveCompletedPages() {
            localStorage.setItem('completedPages', JSON.stringify([...completedPages]));
        }
        
        // 渲染页面列表
        function renderPageList() {
            const pageList = document.getElementById('pageList');
            const categories = {};
            
            // 按分类分组
            pages.forEach(page => {
                if (!categories[page.category]) {
                    categories[page.category] = [];
                }
                categories[page.category].push(page);
            });
            
            let html = '';
            for (const [category, categoryPages] of Object.entries(categories)) {
                html += `<div class="section-title">${category} (${categoryPages.length})</div>`;
                categoryPages.forEach(page => {
                    const isCompleted = completedPages.has(page.id);
                    const isActive = currentPageId === page.id;
                    html += `
                        <div class="page-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" 
                             onclick="selectPage(${page.id})">
                            <div class="page-number">${page.id}</div>
                            <div class="page-info">
                                <div class="page-name">${page.name}</div>
                                <div class="page-file">${page.file}</div>
                            </div>
                            <div class="page-status">${isCompleted ? '✅' : ''}</div>
                        </div>
                    `;
                });
            }
            
            pageList.innerHTML = html;
            updateStats();
        }
        
        // 选择页面
        function selectPage(id) {
            currentPageId = id;
            const page = pages.find(p => p.id === id);
            
            // 更新右侧显示
            document.getElementById('currentPageTitle').textContent = `${page.id}. ${page.name}`;
            document.getElementById('infoTitle').textContent = page.name;
            document.getElementById('infoDesc').textContent = page.desc;
            document.getElementById('infoFile').textContent = `文件：${page.file}`;
            
            // 检查是否有已保存的图片
            const savedImage = localStorage.getItem(`pageImage_${id}`);
            if (savedImage) {
                document.getElementById('previewImage').src = savedImage;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('completionBanner').style.display = completedPages.has(id) ? 'flex' : 'none';
            } else {
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('uploadArea').style.display = 'block';
                document.getElementById('completionBanner').style.display = 'none';
            }
            
            // 更新按钮状态
            document.getElementById('prevBtn').disabled = id <= 1;
            document.getElementById('nextBtn').disabled = id >= pages.length;
            document.getElementById('markDoneBtn').disabled = !savedImage;
            
            renderPageList();
        }
        
        // 上一个页面
        function prevPage() {
            if (currentPageId > 1) {
                selectPage(currentPageId - 1);
            }
        }
        
        // 下一个页面
        function nextPage() {
            if (currentPageId < pages.length) {
                selectPage(currentPageId + 1);
            }
        }
        
        // 处理文件选择
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageData = e.target.result;
                
                // 保存到localStorage
                localStorage.setItem(`pageImage_${currentPageId}`, imageData);
                
                // 更新显示
                document.getElementById('previewImage').src = imageData;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
                document.getElementById('markDoneBtn').disabled = false;
                
                // 更新页面列表
                renderPageList();
            };
            reader.readAsDataURL(file);
        }
        
        // 删除图片
        function removeImage() {
            if (confirm('确定要删除这张图片吗？')) {
                localStorage.removeItem(`pageImage_${currentPageId}`);
                completedPages.delete(currentPageId);
                saveCompletedPages();
                
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('uploadArea').style.display = 'block';
                document.getElementById('completionBanner').style.display = 'none';
                document.getElementById('markDoneBtn').disabled = true;
                
                renderPageList();
            }
        }
        
        // 标记为完成
        function markAsDone() {
            completedPages.add(currentPageId);
            saveCompletedPages();
            
            document.getElementById('completionBanner').style.display = 'flex';
            renderPageList();
            
            // 自动跳转到下一个未完成的页面
            const nextUndone = pages.find(p => !completedPages.has(p.id));
            if (nextUndone) {
                setTimeout(() => {
                    selectPage(nextUndone.id);
                }, 500);
            }
        }
        
        // 更新统计
        function updateStats() {
            const completed = completedPages.size;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('remainingCount').textContent = pages.length - completed;
            
            const progress = (completed / pages.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `${Math.round(progress)}% 已完成 (${completed}/${pages.length})`;
        }
        
        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const input = document.getElementById('fileInput');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                handleFileSelect({ target: { files: [file] } });
            }
        });
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('phoneTime').textContent = `${hours}:${minutes}`;
        }
        
        // 初始化
        loadCompletedPages();
        renderPageList();
        updateTime();
        setInterval(updateTime, 1000);
        
        // 如果有已完成的页面，自动选中第一个
        if (completedPages.size > 0) {
            selectPage([...completedPages][0]);
        }
    </script>
</body>
</html>
