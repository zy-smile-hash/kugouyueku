<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>酷狗乐库页面预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 15px;
            box-shadow: 
                0 50px 100px rgba(0, 0, 0, 0.3),
                inset 0 0 0 2px #333,
                inset 0 0 0 4px #1a1a1a;
            position: relative;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 40px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .screen::-webkit-scrollbar {
            width: 3px;
        }

        .screen::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .screen::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .image-container {
            width: 100%;
            min-height: 100%;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 420px) {
            .phone-frame {
                transform: scale(0.85);
            }
        }

        @media (max-width: 380px) {
            .phone-frame {
                transform: scale(0.75);
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="notch"></div>
        <div class="screen">
            <div class="image-container">
                <img src="./yuelu_image.png" alt="酷狗乐库功能模块拆解">
            </div>
        </div>
    </div>
</body>
</html>
