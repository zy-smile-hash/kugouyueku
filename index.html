<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酷狗乐库功能模块拆解</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .phone {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.3);
            position: relative;
            margin: 30px auto;
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
        }
        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 40px;
            overflow: auto;
        }
        .screen img {
            width: 100%;
            height: auto;
            display: block;
        }
        h1 {
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 酷狗乐库功能模块拆解</h1>
        <div class="phone">
            <div class="notch"></div>
            <div class="screen">
                <img src="https://neeko-copilot.bytedance.net/api/text_to_image?prompt=music%20library%20app%20interface%20design%20with%20colorful%20gradient%20background%20showing%20music%20playlists%20and%20songs%20list%20mobile%20app%20UI&image_size=portrait_16_9" alt="酷狗乐库">
            </div>
        </div>
    </div>
</body>
</html>
