<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酷狗乐库功能模块拆解</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .phone-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background: #000;
            border-radius: 50px;
            padding: 15px;
            box-shadow: 
                0 50px 100px rgba(0, 0, 0, 0.3),
                inset 0 0 0 2px #333,
                inset 0 0 0 4px #1a1a1a;
            position: relative;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #000;
            border-radius: 0 0 20px 20px;
            z-index: 10;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 40px;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .screen::-webkit-scrollbar {
            width: 4px;
        }

        .screen::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 2px;
        }

        .screen::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 2px;
        }

        .image-container {
            width: 100%;
            min-height: 100%;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .footer {
            margin-top: 30px;
            color: white;
            text-align: center;
            font-size: 12px;
            opacity: 0.8;
        }

        @media (max-width: 420px) {
            .phone-frame {
                transform: scale(0.85);
            }
        }

        @media (max-width: 380px) {
            .phone-frame {
                transform: scale(0.75);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎵 酷狗乐库功能模块拆解</h1>
    </div>

    <div class="phone-container">
        <div class="phone-frame">
            <div class="notch"></div>
            <div class="screen">
                <div class="image-container">
                    <img src="yuelu_image.png" alt="酷狗乐库功能模块拆解">
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>酷狗乐库页面完整展示</p>
    </div>
</body>
</html>
